version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - bodyclose
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - forbidigo
    - contextcheck
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - noctx
    - nakedret
    - staticcheck
    - prealloc
    - revive
    - unconvert
    - unparam
    - unused
  settings:
    errcheck:
      check-blank: true
    unused:
      check-exported: true
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
  exclusions:
    generated: lax
    rules:
      - linters:
          - staticcheck
        path: test/e2e/*
      - linters:
          - gosec
        path: test/e2e/*
      - linters:
          - dupl
        path: internal/*
      - linters:
            - dupl
        path: test/*
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$