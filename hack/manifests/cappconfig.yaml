apiVersion: rcs.dana.io/v1alpha1
kind: CappConfig
metadata:
  name: capp-config
  namespace: container-app-operator-system
spec:
  autoscaleConfig:
    rps: 200
    cpu: 80
    memory: 70
    concurrency: 10
    activationScale: 3
    minReplicasLimit: 10
    maxScaleDelay: 3600
  dnsConfig:
    zone: "capp-zone.com."
    cname: "ingress.capp-zone.com."
    provider: "dns-default"
    issuer: "cert-issuer"
  defaultResources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "10m"
      memory: "64Mi"
  allowedHostnamePatterns:
    - match: '.*\.allowed'
      explanation: "subdomains of .allowed domain"
    - match: '.*\.com'
      explanation: "any .com domain"
    - match: 'test.dev-.*'
      explanation: "test subdomains of dev"